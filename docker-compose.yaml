services:

  frontend:
    build: ./organizerr-frontend
    container_name: organizerr-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - frontend.env
    networks:
      - organizerr-network
    restart: unless-stopped

  backend:
    build: ./organizerr-backend
    container_name: organizerr-backend
    ports:
      - "${BACKEND_PORT}:8005"
    env_file:
      - backend.env
    volumes:
      - ./backend_data:/app/data
      - ./uploads:/app/uploads
    networks:
      - organizerr-network
    restart: unless-stopped

networks:
  organizerr-network: