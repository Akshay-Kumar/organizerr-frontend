services:

  frontend:
    build: ./organizerr-frontend
    container_name: organizerr-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - organizerr-network
    restart: unless-stopped

  backend:
    build: ./organizerr-backend
    container_name: organizerr-backend
    ports:
      - "${BACKEND_PORT}:8005"
    env_file:
      - backend.env
    volumes:
      - ./backend_data:/app/data
      - ./uploads:/app/uploads
    networks:
      - organizerr-network
    restart: unless-stopped

  media-organizer:
    build: ./media-organizer
    container_name: media-organizer
    volumes:
      # 🔥 IMPORTANT: map real media paths
      - ${MEDIA_PATH}:/media
      - ${FILE_OPS_PATH}:/config
    environment:
      - API_URL=http://localhost:${BACKEND_PORT}
    networks:
      - organizerr-network
    restart: unless-stopped

networks:
  organizerr-network: